<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Files</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="relative min-h-screen bg-slate-900 font-sans text-slate-100 antialiased flex flex-col justify-center items-center px-4">
    <div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center opacity-25 blur-sm"></div>
    <div class="relative z-10 w-full max-w-md bg-slate-800/70 backdrop-blur-xl border border-slate-700/60 rounded-2xl p-8 shadow-2xl">
        <a href="/documents" class="inline-block text-sm font-medium text-slate-400 hover:text-white mb-6 transition-colors">← Back to Documents</a>
        <h1 class="text-3xl font-bold text-white mb-2">Upload Files</h1>
        <p class="text-sm text-slate-400 mb-6">Select corporate documentation to securely store in the cloud hub.</p>
        <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-5">
            <div class="border-2 border-dashed border-slate-600 rounded-xl p-6 text-center bg-slate-900/40 hover:border-indigo-500 transition-colors">
                <span class="text-3xl block mb-2">📤</span>
                <input type="file" name="file" required 
                       class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 file:cursor-pointer cursor-pointer">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-lg shadow-lg transition-all">
                Upload File to Cloud
            </button>
        </form>
    </div>
</body>
</html>
