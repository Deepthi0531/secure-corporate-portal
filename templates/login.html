<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Authentication</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="relative min-h-screen bg-slate-900 font-sans text-slate-100 antialiased flex flex-col justify-center items-center px-4">
    <div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center opacity-25 blur-sm"></div>

    <div class="relative z-10 w-full max-w-md bg-slate-800/70 backdrop-blur-xl border border-slate-700/60 rounded-2xl p-8 shadow-2xl">
        
        <div class="text-center mb-6">
            <span class="text-xs font-bold tracking-widest text-blue-400 uppercase bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/20">
                Secure Environment
            </span>
            <h1 class="text-3xl font-extrabold text-white mt-4 tracking-tight">Admin Login</h1>
            <p class="text-sm text-slate-400 mt-2">Sign in to access the corporate infrastructure portal.</p>
        </div>
        
        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                <div class="relative">
                    <input type="text" id="username" name="username" placeholder="admin" required
                           class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                           class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
                </div>
            </div>

            <div class="bg-slate-900/40 rounded-lg p-3 border border-slate-700/40 text-[11px] text-slate-400 leading-relaxed">
                🔒 <strong>Notice:</strong> This system is restricted to authorized company operations. Unauthorized access attempts are monitored and logged[cite: 6].
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-lg shadow-lg transition-all shadow-blue-900/30 tracking-wide mt-2 cursor-pointer">
                Authenticate Securely
            </button>
        </form>
    </div>
</body>
</html>
