<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Blog Post</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="relative min-h-screen bg-slate-900 font-sans text-slate-100 antialiased flex flex-col justify-center items-center px-4">
    <div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center opacity-25 blur-sm"></div>

    <div class="relative z-10 w-full max-w-xl bg-slate-800/70 backdrop-blur-xl border border-slate-700/60 rounded-2xl p-8 shadow-2xl">
        <a href="/blog" class="inline-block text-sm font-medium text-slate-400 hover:text-white mb-6 transition-colors">← Back to Blog</a>
        
        <h1 class="text-3xl font-bold text-white mb-6">Create Blog Post</h1>
        
        <form action="/create" method="POST" class="space-y-5">
            <div>
                <label for="title" class="block text-sm font-medium text-slate-300 mb-2">Post Title</label>
                <input type="text" id="title" name="title" placeholder="Enter Title" required
                       class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
            </div>
            <div>
                <label for="content" class="block text-sm font-medium text-slate-300 mb-2">Content</label>
                <textarea id="content" name="content" rows="5" placeholder="Write content..." required
                          class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all resize-none"></textarea>
            </div>
            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-lg shadow-lg transition-all shadow-blue-900/30">
                Publish Post
            </button>
        </form>
    </div>
</body>
</html>
